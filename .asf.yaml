notifications:
  commits: site-pub@aries.apache.org
  issues: site-pub@aries.apache.org
  pullrequests: site-pub@aries.apache.org
  jira_options: link label link label

staging:
  profile: beta
  whoami: master
github:
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
